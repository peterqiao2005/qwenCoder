  <path d="M115 90 Q125 85 135 90" stroke="#FF6B6B" stroke-width="2" fill="none"/>
  
  <!-- 腮红 -->
  <ellipse cx="65" cy="125" rx="10" ry="6" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="135" cy="125" rx="10" ry="6" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- 嘴巴 -->
