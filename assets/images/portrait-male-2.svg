  <path d="M65 250 L65 175 Q65 160 85 158 L115 158 Q135 160 135 175 L135 250 Z" fill="#228B22"/>
  <path d="M85 158 L100 190 L115 158" fill="#90EE90"/>
  
  <!-- 脖子 -->
  <rect x="90" y="140" width="20" height="20" fill="#FFE0BD"/>
  
  <!-- 脸 -->
  <ellipse cx="100" cy="110" rx="55" ry="60" fill="#FFE0BD"/>
  
  <!-- 刘海 -->
  <path d="M45 90 Q50 60 100 55 Q150 60 155 90 Q150 70 100 65 Q50 70 45 90" fill="#8B4513"/>
  
  <!-- 眼睛 -->
  <ellipse cx="75" cy="105" rx="12" ry="15" fill="white"/>
  <ellipse cx="125" cy="105" rx="12" ry="15" fill="white"/>
  <circle cx="78" cy="108" r="8" fill="#8B4513"/>
  <circle cx="128" cy="108" r="8" fill="#8B4513"/>
  <circle cx="80" cy="105" r="3" fill="white"/>
  <circle cx="130" cy="105" r="3" fill="white"/>
  
  <!-- 眉毛 -->
  <path d="M65 90 Q75 85 85 90" stroke="#8B4513" stroke-width="2" fill="none"/>
  <path d="M115 90 Q125 85 135 90" stroke="#8B4513" stroke-width="2" fill="none"/>
  
  <!-- 腮红 -->
  <ellipse cx="65" cy="125" rx="8" ry="5" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="135" cy="125" rx="8" ry="5" fill="#FFB6C1" opacity="0.4"/>
  
  <!-- 嘴巴 -->
  <path d="M90 135 Q100 140 110 135" stroke="#228B22" stroke-width="2" fill="none"/>
  
  <!-- 鼻子 -->
  <circle cx="100" cy="120" r="2" fill="#FFB6C1"/>
  
  <!-- 头发 - 侧边 -->
  <path d="M45 90 Q35 120 40 150" stroke="#8B4513" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M155 90 Q165 120 160 150" stroke="#8B4513" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- 刺猬头造型 -->
  <path d="M55 70 L45 50 L60 65 Z" fill="#8B4513"/>
  <path d="M75 60 L70 40 L80 55 Z" fill="#8B4513"/>
  <path d="M125 60 L130 40 L120 55 Z" fill="#8B4513"/>
  <path d="M145 70 L155 50 L140 65 Z" fill="#8B4513"/>
  
  <!-- T 恤图案 -->
  <circle cx="100" cy="180" r="15" fill="#90EE90"/>
  <path d="M90 175 L100 185 L110 175" stroke="#228B22" stroke-width="2" fill="none"/>
